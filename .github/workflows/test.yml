name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
      - 'releases/*'
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - 'master'
      - 'releases/*'
    paths-ignore:
      - '**.md'

env:
  BUILD_TAG: test
  BASE_IMAGE: test-alpine-s6

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        target:
          - pureftpd
          - rrdtool
        alpine_version:
          - '3.19'
          - '3.20'
          - '3.21'
          - '3.22'
          - '3.23'
          - '3.24'
          - 'edge'
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      -
        name: Prepare
        run: |
          echo "CONTAINER_NAME=${{ matrix.target }}" >> $GITHUB_ENV
          echo "LOG_CHECK=$(cat ./test/${{ matrix.target }}/logcheck.txt)" >> $GITHUB_ENV
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker
      -
        name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          pull: true
          tags: ${{ env.BASE_IMAGE }}
          build-args: |
            ALPINE_VERSION=${{ matrix.alpine_version }}
      -
        name: Build ${{ matrix.target }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./test/${{ matrix.target }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          load: true
          tags: ${{ env.BUILD_TAG }}
      -
        name: Start ${{ matrix.target }}
        run: |
          docker rm -f ${{ env.CONTAINER_NAME }} > /dev/null 2>&1 || true
          docker run -d --name ${{ env.CONTAINER_NAME }} ${{ env.BUILD_TAG }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@46267a6e61cd56aac2fc79943df180152f4c89d6 # v1.10.1
        with:
          name: ${{ env.CONTAINER_NAME }}
          log_check: ${{ env.LOG_CHECK }}
          timeout: 120
      -
        name: Build dist
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          pull: true
          tags: ${{ env.BASE_IMAGE }}-dist
          build-args: |
            ALPINE_VERSION=${{ matrix.alpine_version }}
      -
        name: Check dist content
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./test
          file: ./test/dist.Dockerfile
          build-args: |
            DIST_IMAGE=${{ env.BASE_IMAGE }}-dist
      -
        name: Container logs
        if: always()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}
          docker rm -f ${{ env.CONTAINER_NAME }} > /dev/null 2>&1 || true
