name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
      - 'releases/*'
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - 'master'
      - 'releases/*'
    paths-ignore:
      - '**.md'

env:
  BUILD_TAG: test
  BASE_IMAGE: test-alpine-s6

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        target:
          - pureftpd
          - rrdtool
        alpine_version:
          - '3.18'
          - '3.19'
          - '3.20'
          - '3.21'
          - '3.22'
          - '3.23'
          - 'edge'
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Prepare
        run: |
          echo "CONTAINER_NAME=${{ matrix.target }}" >> $GITHUB_ENV
          echo "LOG_CHECK=$(cat ./test/${{ matrix.target }}/logcheck.txt)" >> $GITHUB_ENV
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker
      -
        name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          pull: true
          tags: ${{ env.BASE_IMAGE }}
          build-args: |
            ALPINE_VERSION=${{ matrix.alpine_version }}
      -
        name: Build ${{ matrix.target }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./test/${{ matrix.target }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          load: true
          tags: ${{ env.BUILD_TAG }}
      -
        name: Start ${{ matrix.target }}
        run: |
          docker rm -f ${{ env.CONTAINER_NAME }} > /dev/null 2>&1 || true
          docker run -d --name ${{ env.CONTAINER_NAME }} ${{ env.BUILD_TAG }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@9ba6e6f9450baf3b1237f8035c1fdc45932510bd # v1.8.0
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: ${{ env.LOG_CHECK }}
          timeout: 120
      -
        name: Build dist
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          pull: true
          tags: ${{ env.BASE_IMAGE }}-dist
          build-args: |
            ALPINE_VERSION=${{ matrix.alpine_version }}
      -
        name: Check dist content
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./test
          file: ./test/dist.Dockerfile
          build-args: |
            DIST_IMAGE=${{ env.BASE_IMAGE }}-dist
      -
        name: Container logs
        if: always()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}
          docker rm -f ${{ env.CONTAINER_NAME }} > /dev/null 2>&1 || true
